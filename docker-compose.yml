version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:8000/api/v1}
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - scout-network
networks:
  scout-network:
    driver: bridge
